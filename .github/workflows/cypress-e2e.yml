name: Cypress E2E

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Nightly smoke run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: cypress-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CYPRESS_BASE_URL: https://opensource-demo.orangehrmlive.com/web/index.php
  CYPRESS_useDemo: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run lint

  cypress:
    name: E2E — ${{ matrix.name }}
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Login
            spec: cypress/e2e/login/**/*.cy.js
            artifact: login
          - name: Recruitment
            spec: cypress/e2e/recruitment/**/*.cy.js
            artifact: recruitment

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Excel test data
        run: npm run generate-data

      - name: Run Cypress (${{ matrix.name }})
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: npx cypress run --spec "${{ matrix.spec }}"
          record: ${{ secrets.CYPRESS_RECORD_KEY != '' }}
          parallel: false
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.artifact }}-${{ github.run_id }}
          path: cypress/reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.artifact }}-${{ github.run_id }}
          path: cypress/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ matrix.artifact }}-${{ github.run_id }}
          path: cypress/videos/
          retention-days: 7
          if-no-files-found: ignore

  merge-report:
    name: Publish combined status
    needs: cypress
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all Cypress jobs passed
        run: |
          if [ "${{ needs.cypress.result }}" != "success" ]; then
            echo "One or more Cypress matrix jobs failed."
            exit 1
          fi
          echo "All Cypress E2E jobs passed."
